<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gennetex ERP — Админ</title>
  <link rel="icon" href="logo.png"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    :root{
      --bg:#f9fafb;--card:#ffffff;--line:#eef0f4;--text:#111827;--muted:#6b7280;
      --primary:#4f6ef7;--primary2:#4f6ef7;--primary-soft:#eff4ff;
      --success:#10b981;--warning:#f59e0b;--danger:#ef4444;--accent:#6366f1;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text)}
    button{cursor:pointer;border:none;font-weight:600;font-family:inherit}
    input,select{font-family:inherit;font-size:14px;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--text);width:100%;transition:border-color .15s,box-shadow .15s}
    input:focus,select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,110,247,.12)}
    .btn{border-radius:12px;padding:11px 16px;font-size:14px;transition:opacity .15s,transform .1s}
    .btn:hover{opacity:.94}
    .btn:active{transform:scale(.98)}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-success{background:var(--success);color:#fff}
    .btn-danger{background:var(--danger);color:#fff}
    .btn-ghost{background:#fff;border:1px solid var(--line);color:var(--muted)}
    .btn-sm{padding:6px 10px;font-size:13px;border-radius:8px}

    /* Login — цагаан цэвэр */
    #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg)}
    .login-card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:40px 36px;width:100%;max-width:420px;box-shadow:0 12px 40px rgba(17,24,39,.06)}
    .login-card h1{margin:0 0 6px;font-size:26px;color:var(--text);font-weight:800;letter-spacing:-.3px}
    .login-card p{margin:0 0 28px;color:var(--muted);font-size:14px}
    #login label{display:block;font-size:13px;color:var(--muted);margin:16px 0 8px;font-weight:600}
    #login .err{color:#b91c1c;background:#fef2f2;padding:10px;border-radius:10px;margin-top:12px;font-size:13px;display:none}
    label{display:block;font-size:13px;color:var(--muted);margin:14px 0 6px;font-weight:600}
    .err{color:#b71c1c;background:#ffebee;padding:10px;border-radius:8px;margin-top:12px;font-size:13px;display:none}

    /* Layout */
    #app{display:none;min-height:100vh}
    .layout{display:flex;min-height:100vh}
    .side{width:248px;background:#fff;color:var(--text);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;border-right:1px solid var(--line)}
    .brand{padding:22px 22px 18px;font-size:18px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line)}
    .brand img{background:transparent;border-radius:0;padding:0}
    .nav{flex:1;padding:10px 12px;overflow-y:auto}
    .nav .grp{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:16px 10px 6px}
    .nav a{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;color:var(--muted);text-decoration:none;font-size:14px;font-weight:600;margin-bottom:2px}
    .nav a:hover{background:var(--bg);color:var(--text)}
    .nav a.active{background:var(--primary-soft);color:var(--primary)}
    .nav .ic{width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex:0 0 22px}
    .nav .ic svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
    .side .foot{padding:16px 22px;font-size:12px;color:var(--muted);border-top:1px solid var(--line)}
    .main{flex:1;margin-left:248px;background:var(--bg)}
    .topbar{background:#fff;padding:18px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:900;border-bottom:1px solid var(--line)}
    .topbar h2{margin:0;font-size:20px;font-weight:800;letter-spacing:-.2px}
    .user{display:flex;align-items:center;gap:10px}
    .avatar{width:38px;height:38px;border-radius:50%;background:var(--primary-soft);color:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:800;border:1px solid var(--line)}
    .av-sm{width:30px;height:30px;border-radius:50%;object-fit:cover;flex:0 0 auto}
    .av-ph{background:var(--primary-soft);color:var(--primary);display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:13px}
    .content{padding:28px;max-width:1250px}

    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
    .stat{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px 20px;display:flex;gap:14px;align-items:center}
    .stat .ic{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex:0 0 48px}
    .stat .ic svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
    .stat .v{font-size:26px;font-weight:800;line-height:1;letter-spacing:-.3px}
    .stat .l{color:var(--muted);font-size:12px;margin-top:5px}

    .card{background:var(--card);border:1px solid var(--line);border-radius:18px}
    .card-h{padding:18px 22px;border-bottom:1px solid rgba(230,233,242,.7);display:flex;align-items:center;justify-content:space-between}
    .card-h h3{margin:0;font-size:16px}
    .card-b{padding:20px}
    #map{height:440px;border-radius:14px}
    .grid2{display:grid;grid-template-columns:2fr 1fr;gap:20px}

    table{width:100%;border-collapse:collapse}
    th,td{text-align:left;padding:13px 20px;font-size:14px;border-bottom:1px solid rgba(230,233,242,.8)}
    th{color:var(--muted);font-weight:600;background:#fafbff;font-size:12px;text-transform:uppercase;letter-spacing:.04em}
    tbody tr{transition:background .12s}
    tbody tr:hover{background:#f8f9fd}
    tr:last-child td{border-bottom:none}
    .pill{display:inline-block;padding:4px 11px;border-radius:999px;font-size:12px;font-weight:700}
    .pill.on{background:#e3f9ef;color:#1fbf75}.pill.off{background:#eef1f8;color:#7986a8}
    .pill.in{background:#e3f9ef;color:#1fbf75}.pill.out{background:#ffeaea;color:#ef5350}
    .pill.admin{background:#efe9ff;color:#7b5cff}.pill.emp{background:#e8edff;color:#4f6ef7}
    img.selfie{width:42px;height:42px;border-radius:9px;object-fit:cover;vertical-align:middle}
    img.inv-thumb{width:42px;height:42px;border-radius:10px;object-fit:cover;vertical-align:middle;background:#f3f5fb}
    .muted{color:var(--muted)}
    .empty{text-align:center;color:var(--muted);padding:40px}

    /* Modal */
    .overlay{position:fixed;inset:0;background:rgba(20,28,54,.55);display:none;align-items:center;justify-content:center;z-index:2000;padding:20px}
    .modal{background:#fff;border-radius:20px;width:100%;max-width:460px;max-height:92vh;overflow:auto;box-shadow:0 24px 64px rgba(20,28,54,.2)}
    .modal-h{padding:18px 22px;border-bottom:1px solid var(--line);font-size:17px;font-weight:800;display:flex;justify-content:space-between;align-items:center}
    .modal-b{padding:22px}
    .modal-f{padding:16px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
    .x{background:none;color:var(--muted);font-size:20px}
    .row{display:flex;gap:12px}.row>*{flex:1}
    .qrbox{text-align:center}
    .qrbox img{background:#fff;padding:10px;border:1px solid var(--line);border-radius:12px}
    .plate{display:inline-block;border:2px solid var(--primary);border-radius:8px;padding:6px 14px;font-weight:900;font-size:20px;letter-spacing:1px}
    .toast{position:fixed;bottom:24px;right:24px;background:#1e2740;color:#fff;padding:14px 20px;border-radius:12px;z-index:3000;display:none;box-shadow:0 10px 30px rgba(0,0,0,.3)}
    .chk{display:flex;align-items:center;gap:10px;padding:8px 0}
    .bar-row{display:flex;gap:8px;align-items:flex-end}
    .bar-row>div{flex:1}
    #qr-reader{border-radius:12px;overflow:hidden;min-height:260px}
    @media(max-width:900px){.side{width:64px}.brand span,.nav a span.t,.nav .grp{display:none}.main{margin-left:64px}.stats{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <!-- Нэвтрэх -->
  <div id="login">
    <div class="login-card">
      <div style="text-align:center;margin-bottom:20px"><img src="logo.png" alt="Gennetex" style="height:72px"/></div>
      <h1 style="text-align:center">Gennetex ERP</h1>
      <p style="text-align:center">Имэйл, нууц үгээр нэвтэрнэ үү</p>
      <label>Имэйл</label>
      <input id="email" type="email" placeholder="admin@gennetex.mn"/>
      <label>Нууц үг</label>
      <input id="password" type="password" placeholder="••••••••"/>
      <button class="btn btn-primary" id="loginBtn" style="width:100%;margin-top:18px;padding:13px">Нэвтрэх</button>
      <div class="err" id="loginErr"></div>
    </div>
  </div>

  <!-- App -->
  <div id="app">
    <div class="layout">
      <aside class="side">
        <div class="brand"><img src="logo.png" style="height:28px"/> <span>Gennetex</span></div>
        <nav class="nav" id="nav">
          <div class="grp">Үндсэн</div>
          <a data-view="dashboard" class="active"><span class="ic"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="5" rx="1.5"/><rect x="13" y="12" width="8" height="9" rx="1.5"/><rect x="3" y="15" width="8" height="6" rx="1.5"/></svg></span><span class="t">Хяналт</span></a>
          <a data-view="employees"><span class="ic"><svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3"/><circle cx="17" cy="9" r="2.5"/><path d="M4 19c0-3 2.5-5 5-5s5 2 5 5M14 19c0-2 1.5-3.5 3.5-3.5"/></svg></span><span class="t">Ажилчид</span></a>
          <a data-view="reports"><span class="ic"><svg viewBox="0 0 24 24"><rect x="5" y="3" width="14" height="18" rx="2"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="13" y2="16"/></svg></span><span class="t">Тайлан</span></a>
          <a data-view="attendance"><span class="ic"><svg viewBox="0 0 24 24"><rect x="4" y="6" width="16" height="14" rx="2"/><circle cx="12" cy="12" r="3"/></svg></span><span class="t">Ирц</span></a>
          <div class="grp">Байршил</div>
          <a data-view="location"><span class="ic"><svg viewBox="0 0 24 24"><path d="M12 21s6-5.2 6-10a6 6 0 1 0-12 0c0 4.8 6 10 6 10z"/><circle cx="12" cy="11" r="2"/></svg></span><span class="t">Байршил</span></a>
          <a data-view="visits"><span class="ic"><svg viewBox="0 0 24 24"><path d="M4 10.5 12 4l8 6.5V19H4z"/></svg></span><span class="t">Очсон лог</span></a>
          <div class="grp">Тээвэр</div>
          <a data-view="vehicles"><span class="ic"><svg viewBox="0 0 24 24"><path d="M5 16l1.5-5h11L19 16"/><rect x="3" y="16" width="18" height="4" rx="1"/><circle cx="7.5" cy="18.5" r="1.5"/><circle cx="16.5" cy="18.5" r="1.5"/></svg></span><span class="t">Машин / QR</span></a>
          <a data-view="trips"><span class="ic"><svg viewBox="0 0 24 24"><path d="M4 17c3-8 13-8 16 0"/><circle cx="7" cy="17" r="1.5"/><circle cx="17" cy="17" r="1.5"/></svg></span><span class="t">Аялал</span></a>
          <a data-view="companions"><span class="ic"><svg viewBox="0 0 24 24"><circle cx="8" cy="8" r="3"/><circle cx="16" cy="9" r="2.5"/><path d="M3 19c0-3 2.5-5 5-5s5 2 5 5M13 19c0-2 1.5-3.5 3.5-3.5"/></svg></span><span class="t">Хамт яваа багууд</span></a>
          <a data-view="servicecalls"><span class="ic"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg></span><span class="t">Дуудлага</span></a>
          <a data-view="sitework"><span class="ic"><svg viewBox="0 0 24 24"><path d="M12 21s6-5.2 6-10a6 6 0 1 0-12 0c0 4.8 6 10 6 10z"/><circle cx="12" cy="11" r="2"/></svg></span><span class="t">Ажлын байр</span></a>
          <div class="grp">Агуулах</div>
          <a data-view="inventory"><span class="ic"><svg viewBox="0 0 24 24"><path d="M4 8l8-4 8 4v10H4z"/><line x1="12" y1="11" x2="12" y2="15"/></svg></span><span class="t">Агуулах</span></a>
          <a data-view="usage"><span class="ic"><svg viewBox="0 0 24 24"><rect x="5" y="4" width="14" height="17" rx="2"/><line x1="8" y1="9" x2="16" y2="9"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/></svg></span><span class="t">Барааны хэрэглээ</span></a>
        </nav>
        <div class="foot">Gennetex ERP v1.0</div>
      </aside>
      <div class="main">
        <div class="topbar">
          <h2 id="pageTitle">Хяналт</h2>
          <div class="user">
            <div class="avatar" id="uAvatar">A</div>
            <div>
              <div id="uName" style="font-weight:700;font-size:14px">Админ</div>
              <div class="muted" style="font-size:12px">Админ эрх</div>
            </div>
            <button class="btn btn-ghost btn-sm" id="logoutBtn" style="margin-left:12px">Гарах</button>
          </div>
        </div>
        <div class="content" id="content"></div>
      </div>
    </div>
  </div>

  <div class="overlay" id="overlay"></div>
  <div class="overlay" id="scanOverlay" style="z-index:2500"></div>
  <div class="toast" id="toast"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://xhxyrzzgmksjlibfrmlx.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhoeHlyenpnbWtzamxpYmZybWx4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4ODEwMjYsImV4cCI6MjA5ODQ1NzAyNn0.nYWs_N09RLHvhmEUCdbS6M8yvthsKJ5TkXjdRv4VMag';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const $ = id => document.getElementById(id);
    const COLORS = ['#4f6ef7','#1fbf75','#f5a623','#ef5350','#7b5cff','#06b6d4'];
    const money = n => new Intl.NumberFormat('mn-MN').format(Math.round(n||0))+'₮';
    const SAMPLE_NAMES=new Set(['Бат-Эрдэнэ','Бат Эрдэнэ','Оюунчимэг','Ганбаатар']);
    const isSampleName=n=>SAMPLE_NAMES.has(String(n||'').trim());
    const dropSampleRows=(rows,fields)=> (rows||[]).filter(r=>!fields.some(f=>isSampleName(r[f])));
    const isSuperAdmin=r=>r==='superadmin';
    const isAdminRole=r=>r==='admin' ||r==='superadmin';
    const roleLabel=r=>r==='superadmin' ?'Системийн админ':r==='admin' ?'Админ':'Ажилтан';
    const visibleWorkers=()=>{
      const base=(data.workers||[]).filter(w=>isSuperAdmin(me?.role)||w.role!=='superadmin');
      if(isSuperAdmin(me?.role)) return base;
      return base.filter(w=>w.role==='employee');
    };
    const fieldWorkers=()=>visibleWorkers().filter(w=>w.role==='employee');

    const INV_IMG_RULES=[
      [/router|чиглүүлэгч/i,'router'],[/switch/i,'switch'],[/оптик кабель(?!.*патч)(?!.*адаптер)/i,'fiber-cable'],
      [/utp|cat6/i,'utp-cable'],[/кримп/i,'crimp-tool'],[/rj45/i,'rj45'],[/\bonu\b/i,'onu'],[/access point|wifi/i,'access-point'],
      [/медиа конвертер/i,'media-converter'],[/патч панель/i,'patch-panel'],[/оптик патч/i,'fiber-patch'],
      [/кабелийн суваг|кабель канал/i,'cable-tray'],[/тэжээлийн адаптер|адаптер 12v/i,'power-adapter'],
      [/кабель боолт|стяжка/i,'cable-tie'],      [/дюбель|шураг багц/i,'wall-anchor'],[/оптик адаптер/i,'fiber-adapter'],
      [/кабель тестер|lan.*тестер/i,'cable-tester'],[/fusion splicer|splicer/i,'fusion-splicer'],
      [/cleaver/i,'cleaver'],[/otdr/i,'otdr'],[/power meter|хэмжигч.*оптик/i,'power-meter'],
      [/хусагч|stripper/i,'stripper'],[/шураг эргүүлэгч/i,'screwdriver'],[/өрөм/i,'drill'],[/шат/i,'ladder']
    ];
    function invImg(name,cat){
      for(const [re,key] of INV_IMG_RULES) if(re.test(name||'')) return `images/inventory/${key}.svg`;
      return `images/inventory/${cat==='tool' ?'default-tool':'default-material'}.svg`;
    }
    function invThumb(it){ return `<img class="inv-thumb" src="${invImg(it.name,it.category||'material')}" alt="" loading="lazy">`; }

    let me=null, map=null, markers=[], view='dashboard', timer=null;
    let data = {workers:[],attendance:[],visits:[],trips:[],tripGroups:[],tripGroupsToday:[],tripGroupsArchive:[],siteSessions:[],serviceCalls:[],inventory:[],vehicles:[],movements:[],reports:[],shifts:[],attLocations:[],breakSchedules:[]};
    let companionTab='today';
    let usageTab='balances';
    const movementDelta=m=>{
      const q=Number(m.quantity)||0;
      const type=m.movement_type||'withdraw';
      if(type==='consume' ||type==='return') return -q;
      return q;
    };
    const movementTypeLabel=t=>({consume:'Хэрэглээ',return:'Буцаалт'}[t]||'Олголт');
    const inventoryByIdMap=()=>{
      const m={};
      (data.inventory||[]).forEach(it=>{ m[it.id]=it; });
      return m;
    };
    const computeStockBalances=(movements,opts={})=>{
      const {userId,itemId,category}=opts;
      const invMap=inventoryByIdMap();
      const map={};
      (movements||[]).forEach(m=>{
        if(userId&&m.user_id!==userId) return;
        if(itemId&&m.item_id!==itemId) return;
        const cat=invMap[m.item_id]?.category||m.category||'material';
        if(category&&cat!==category) return;
        const key=m.item_id||m.item_name;
        if(!key) return;
        if(!map[key]) map[key]={item_id:m.item_id,item_name:m.item_name||'—',unit:m.unit||'ширхэг',category:cat,quantity:0,user_id:m.user_id,user_name:m.user_name};
        map[key].quantity+=movementDelta(m);
      });
      return Object.values(map).filter(x=>x.quantity>0.0001).sort((a,b)=>b.quantity-a.quantity);
    };
    const computeBalancesByUser=(movements)=>{
      const invMap=inventoryByIdMap();
      const byUser={};
      (movements||[]).forEach(m=>{
        const uid=m.user_id||m.user_name;
        if(!uid) return;
        if(!byUser[uid]) byUser[uid]={user_id:m.user_id,user_name:m.user_name||'Тодорхойгүй',items:{}};
        const key=m.item_id||m.item_name;
        if(!key) return;
        if(!byUser[uid].items[key]) byUser[uid].items[key]={item_id:m.item_id,item_name:m.item_name||'—',unit:m.unit||'ширхэг',category:invMap[m.item_id]?.category||'material',quantity:0};
        byUser[uid].items[key].quantity+=movementDelta(m);
      });
      return Object.values(byUser).map(u=>({...u,items:Object.values(u.items).filter(it=>it.quantity>0.0001)})).filter(u=>u.items.length).sort((a,b)=>(a.user_name||'').localeCompare(b.user_name||'','mn'));
    };
    window.setUsageTab=(tab)=>{ usageTab=tab; render(); };
    const CALL_TYPES=[
      {key:'new',label:'Шинэ айл',icon: '',color:'#22c55e'},
      {key:'t30',label:'Шилжүүлэг 30k',icon: '',color:'#3b82f6'},
      {key:'t100',label:'Шилжүүлэг 100k',icon: '',color:'#8b5cf6'},
      {key:'gombol',label:'Гомбол',icon: '',color:'#f59e0b'},
      {key:'repair',label:'Засвар',icon: '',color:'#06b6d4'},
      {key:'other',label:'Бусад',icon: '',color:'#64748b'}
    ];
    const callTypeMeta=k=>CALL_TYPES.find(t=>t.key===k)||CALL_TYPES[CALL_TYPES.length-1];
    const WEEKDAYS=[{d:1,l:'Даваа'},{d:2,l:'Мягмар'},{d:3,l:'Лхагва'},{d:4,l:'Пүрэв'},{d:5,l:'Баасан'},{d:6,l:'Бямба'},{d:7,l:'Ням'}];
    const TIME_OPTIONS=(()=>{const o=[];for(let h=6;h<=22;h++)for(let m=0;m<60;m+=30){if(h===22&&m>0)break;o.push(String(h).padStart(2,'0')+':'+String(m).padStart(2,'0'));}return o;})();
    function timeSelect(id,val,allowEmpty=true){
      const opts=(allowEmpty?'<option value="">—</option>':'')+TIME_OPTIONS.map(t=>`<option value="${t}"${t===val?'selected':''}>${t}</option>`).join('');
      return `<select id="${id}">${opts}</select>`;
    }

    const timeAgo = ts => { if(!ts) return '—'; const m=Math.floor((Date.now()-new Date(ts))/60000);
      if(m<1)return 'дөнгөж сая'; if(m<60)return m+'мин'; const h=Math.floor(m/60); if(h<24)return h+'цаг'; return Math.floor(h/24)+'өдөр'; };
    const online = w => w.latitude!=null && w.last_seen && (Date.now()-new Date(w.last_seen)<3e5);
    const formatDuration = sec => {
      if(!sec||sec<1) return '0 мин';
      const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60);
      return h>0 ? `${h} ц ${m} мин` : `${m} мин`;
    };
    const sessionDuration = s => {
      if(!s?.arrived_at) return 0;
      const end = s.departed_at ? new Date(s.departed_at) : (s.status==='on_site' ? new Date() : null);
      if(!end) return 0;
      return Math.max(0, Math.floor((end - new Date(s.arrived_at))/1000));
    };
    const tripDuration = t => {
      if(!t?.started_at) return 0;
      const end = t.ended_at ? new Date(t.ended_at) : (t.status==='active' ? new Date() : null);
      if(!end) return 0;
      return Math.max(0, Math.floor((end - new Date(t.started_at))/1000));
    };
    const tripKm = t => Number(t?.distance_km ?? 0);
    const tripKmLabel = t => `${tripKm(t).toFixed(2)} км`;
    const siteStatusLabel = s => ({on_site:'Байр дээр',left:'Явсан',submitted:'Илгээсэн',pending:'Хүлээгдэж буй'}[s]||s);
    const todayStart = () => { const d=new Date(); d.setHours(0,0,0,0); return d; };
    const countTodayBags = () => (data.tripGroupsToday||[]).length;
    const buildPassByTrip=(trips,tripPassengers,siteSessions)=>{
      const passByTrip={};
      const mapSessionPassengers=(s)=> (s.passengers||[]).map(p=>({
        trip_id:s.trip_id,
        passenger_id:p.id||p.passenger_id,
        passenger_name:p.name||p.passenger_name,
        scanned_at:s.created_at,
      }));
      (tripPassengers||[]).forEach(p=>{
        if(!passByTrip[p.trip_id]) passByTrip[p.trip_id]=[];
        passByTrip[p.trip_id].push(p);
      });
      const tripIds=new Set((trips||[]).map(t=>t.id));
      const seenSession=new Set();
      [...(siteSessions||[])].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).forEach(s=>{
        if(!s.trip_id||!tripIds.has(s.trip_id)||seenSession.has(s.trip_id)) return;
        if(passByTrip[s.trip_id]?.length) return;
        if(!Array.isArray(s.passengers)||!s.passengers.length) return;
        seenSession.add(s.trip_id);
        passByTrip[s.trip_id]=mapSessionPassengers(s);
      });
      const todayMs=todayStart().getTime();
      const newestActiveByDriver={};
      (trips||[]).forEach(t=>{
        if(t.status!=='active' ||new Date(t.started_at)<todayMs) return;
        const key=t.driver_id||t.driver_name;
        if(!key) return;
        const prev=newestActiveByDriver[key];
        if(!prev||new Date(t.started_at)>new Date(prev.started_at)) newestActiveByDriver[key]=t;
      });
      const rosterByDriver={};
      [...(siteSessions||[])].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).forEach(s=>{
        if(!Array.isArray(s.passengers)||!s.passengers.length) return;
        const key=s.driver_id||s.driver_name;
        if(!key||rosterByDriver[key]) return;
        rosterByDriver[key]=s;
      });
      Object.entries(rosterByDriver).forEach(([key,s])=>{
        const trip=newestActiveByDriver[key];
        if(!trip||passByTrip[trip.id]?.length) return;
        passByTrip[trip.id]=mapSessionPassengers(s);
      });
      return passByTrip;
    };
    const buildTripGroups=(trips,passByTrip)=>(trips||[]).map(t=>{
      const driverId=t.driver_id;
      const passengers=(passByTrip[t.id]||[]).filter(p=>(p.passenger_id||p.id)!==driverId);
      return {...t,passengers};
    }).filter(t=>t.driver_id||t.driver_name);
    window.setCompanionTab=(tab)=>{ companionTab=tab; render(); };
    const toast = m => { const t=$('toast'); t.textContent=m; t.style.display='block'; setTimeout(()=>t.style.display='none',3000); };

    // ===== Auth =====

    // ===== Data =====
    function startRefresh(){ loadAll(); if(timer)clearInterval(timer); timer=setInterval(()=>loadAll(true),15000); }

      try{

          if(!tp.error) tripPassengers=tp.data||[];
        }

      const passByTrip=buildPassByTrip(tr.data,tripPassengers,sw.data);
      if(!tripPassengers.length && (tr.data||[]).some(t=>t.status==='active')){
        console.warn('trip_passengers хүснэгт байхгүй — fix_trip_passengers.sql ажиллуулна уу');
      }
      const allTripGroups=buildTripGroups((tr.data||[]).map(t=>({...t,driver_name:isSampleName(t.driver_name)?null:t.driver_name})),passByTrip);
      const todayMs=todayStart().getTime();
      const tripGroupsToday=allTripGroups.filter(t=>new Date(t.started_at)>=todayMs);
      const tripGroupsArchive=allTripGroups.filter(t=>new Date(t.started_at)<todayMs);
      const tripGroups=tripGroupsToday;
      data={workers:dropSampleRows(w.data,['name']),attendance:dropSampleRows(a.data,['staff_name','user_name']),
        visits:dropSampleRows(v.data,['customer','user_name']),trips:(tr.data||[]).map(t=>({...t,driver_name:isSampleName(t.driver_name)?null:t.driver_name})),
        tripGroups,tripGroupsToday,tripGroupsArchive,
        siteSessions:sw.data||[],
        serviceCalls:sc.data||[],
        inventory:inv.data||[],vehicles:(veh.data||[]).map(v=>({...v,driver_name:isSampleName(v.driver_name)?null:v.driver_name})),
        movements:dropSampleRows(mov.data,['user_name','staff_name']),reports:dropSampleRows(rep.data,['user_name']),
        shifts:dropSampleRows((sh.data||[]).map(s=>({...s,location_name:s.attendance_locations?.name||null})),['user_name']),
        attLocations:al.data||[],breakSchedules:dropSampleRows(br.data,['user_name'])};
      // Interval үед газрын зураг байвал зөвхөн marker шинэчилнэ (zoom тогтвортой)
      if(silent && (view==='dashboard' ||view==='location') && map && document.body.contains($('map'))){
        refreshMarkers(); return;
      }
      render();
    }

      const wb=XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb,ws,sheetName);
      const stamp=new Date().toISOString().slice(0,10);
      XLSX.writeFile(wb,`${filename}_${stamp}.xlsx`);
    }

    window.exportTrips=()=>{
      const rows=[['Машин','Жолооч','Зам(км)','Хугацаа','Түлш(л)','Зардал','Эхэлсэн','Дууссан','Төлөв']];
      data.trips.forEach(t=>rows.push([
        t.plate_number||'',t.driver_name||'',Number(t.distance_km||0).toFixed(2),formatDuration(tripDuration(t)),
        Number(t.liters||0).toFixed(2),Number(t.cost||0),
        new Date(t.started_at).toLocaleString('mn-MN'),
        t.ended_at?new Date(t.ended_at).toLocaleString('mn-MN'):'',
        t.status==='active' ?'Идэвхтэй':'Дууссан',
      ]));
      exportExcel('ayalal','Аялал',rows);
    };
    window.exportCompanions=()=>{
      if(typeof XLSX==='undefined'){ toast('Excel сан ачаалагдаагүй байна'); return; }
      const list=companionTab==='today' ?(data.tripGroupsToday||[]):(data.tripGroupsArchive||[]);
      const summary=[['Огноо','Жолооч','Машин','Зам(км)','Хугацаа','Хамт явагчид','Төлөв','Эхэлсэн','Дууссан']];
      const detail=[['Огноо','Жолооч','Машин','Зам(км)','Хугацаа','Хамт явагч','Төлөв']];
      list.forEach(t=>{
        const day=new Date(t.started_at).toLocaleDateString('mn-MN');
        const status=t.status==='active' ?'Идэвхтэй':'Дууссан';
        const names=(t.passengers||[]).map(p=>p.passenger_name).filter(Boolean);
        const km=Number(t.distance_km||0).toFixed(2);
        const dur=formatDuration(tripDuration(t));
        summary.push([
          day,
          t.driver_name||'',
          t.plate_number||'',
          km,
          dur,
          names.length?names.join(', '):'—',
          status,
          new Date(t.started_at).toLocaleString('mn-MN'),
          t.ended_at?new Date(t.ended_at).toLocaleString('mn-MN'):'',
        ]);
        if(names.length){
          names.forEach(n=>detail.push([day,t.driver_name||'',t.plate_number||'',km,dur,n,status]));
        }else{
          detail.push([day,t.driver_name||'',t.plate_number||'',km,dur,'—',status]);
        }
      });
      const wb=XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(summary),'Багууд');
      XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(detail),'Дэлгэрэнгүй');
      const stamp=new Date().toISOString().slice(0,10);
      const tag=companionTab==='today' ?'unuudur':'arhiv';
      XLSX.writeFile(wb,`hamt_yvaa_bag_${tag}_${stamp}.xlsx`);
    };

    async function pushToUser(userId,{title,body,data}){
      if(!userId) return;
      const {data:rows}=await sb.from('push_tokens').select('token').eq('user_id',userId);
      const tokens=[...new Set((rows||[]).map(r=>r.token).filter(Boolean))];
      if(!tokens.length) return;
      await fetch('https://exp.host/--/api/v2/push/send',{
        method:'POST',
        headers:{'Accept':'application/json','Content-Type':'application/json'},
        body:JSON.stringify(tokens.map(to=>({to,title,body,sound:'default',priority:'high',channelId:'chat',data:data||{}})))
      });
    }

          <option value="Хүлээгдэж буй"${x.status==='Хүлээгдэж буй' ?'selected':''}>Хүлээгдэж буй</option>
          <option value="Явж байгаа"${x.status==='Явж байгаа' ?'selected':''}>Явж байгаа</option>
          <option value="Дууссан"${x.status==='Дууссан' ?'selected':''}>Дууссан</option>
        </select>
      `,'Хадгалах', async ()=>{
        const status=$('sc_status').value;
        const {error}=await sb.from('service_calls').update({status,updated_at:new Date().toISOString()}).eq('id',x.id);
        if(error){ toast(error.message); return false; }
        closeModal(); toast('Шинэчлэгдлээ'); loadAll(); return false;
      });
    };

    // ===== Хамт яваа багууд =====
    function renderCompanions(c){
      const list=companionTab==='today' ?(data.tripGroupsToday||[]):(data.tripGroupsArchive||[]);
      window._companionList=list;
      const totalKm=list.reduce((s,t)=>s+tripKm(t),0);
      const totalSec=list.reduce((s,t)=>s+tripDuration(t),0);
      const activeCount=list.filter(t=>t.status==='active').length;
      const colSpan=isSuperAdmin(me?.role)?8:7;
      const tab=(k,label)=>`<button class="btn btn-sm ${companionTab===k?'btn-primary':'btn-ghost'}" onclick="setCompanionTab('${k}')">${label}</button>`;
      c.innerHTML=`<div class="card"><div class="card-h"><h3>Хамт яваа багууд</h3>
        <div style="display:flex;gap:8px;flex-wrap:wrap">${tab('today','Өнөөдөр ('+(data.tripGroupsToday||[]).length+')')}${tab('archive','Архив ('+(data.tripGroupsArchive||[]).length+')')}
        <button class="btn btn-primary btn-sm" onclick="exportCompanions()">Excel</button></div></div>
        <div class="card-b" style="padding:12px 16px">
          <p class="muted" style="margin:0 0 8px;font-size:13px">Нэг баг = нэг жолооч + түүний QR уншуулсан хүмүүс. Өдөр бүр шинэ баг үүснэ.</p>
          <p style="margin:0;font-size:14px"><b>Нийт:</b> ${totalKm.toFixed(2)} км · ${formatDuration(totalSec)}${activeCount?` · <span class="pill on">${activeCount} идэвхтэй</span>`:''}</p>
        </div>
        <div class="card-b" style="padding:0"><table><thead><tr><th>Огноо</th><th>Жолооч</th><th>Машин</th><th>Зам</th><th>Хугацаа</th><th>Хамт явагч</th><th>Төлөв</th>${isSuperAdmin(me?.role)?'<th></th>':''}</tr></thead>
        <tbody>${list.map((t,i)=>`<tr>
          <td class=muted style="cursor:pointer" onclick="openCompanionModal(${i})">${new Date(t.started_at).toLocaleDateString('mn-MN')}</td>
          <td style="cursor:pointer" onclick="openCompanionModal(${i})"><b>${t.driver_name||'—'}</b></td>
          <td style="cursor:pointer" onclick="openCompanionModal(${i})">${t.plate_number||'—'}</td>
          <td style="cursor:pointer" onclick="openCompanionModal(${i})"><b>${tripKmLabel(t)}</b></td>
          <td class=muted style="cursor:pointer" onclick="openCompanionModal(${i})">${formatDuration(tripDuration(t))}${t.status==='active'&&!t.ended_at?'*':''}</td>
          <td class=muted style="cursor:pointer" onclick="openCompanionModal(${i})">${(t.passengers||[]).length?(t.passengers||[]).map(p=>p.passenger_name).join(', '):'—'}</td>
          <td style="cursor:pointer" onclick="openCompanionModal(${i})"><span class="pill ${t.status==='active' ?'on':'off'}">${t.status==='active' ?'Идэвхтэй':'Дууссан'}</span></td>
          ${isSuperAdmin(me?.role)?`<td><button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteCompanionTeam('${t.id}','${String(t.driver_name||'').replace(/'/g,"\\'")}')">Устгах</button></td>`:''}
        </tr>`).join('')||`<tr><td colspan=${colSpan} class=empty>${companionTab==='today' ?'Өнөөдрийн баг алга':'Архив хоосон'}</td></tr>`}
        </tbody></table></div>
        <div class="card-b"><p class="muted" style="margin:0;font-size:13px">* идэвхтэй аялал — хугацаа шинэчлэгдэж байна. Мөр дээр дарж дэлгэрэнгүй харна.${isSuperAdmin(me?.role)?'Системийн админ багийг устгаж болно.':''}</p></div></div>`;
    }
    async function deleteCompanionTeam(tripId, driverName){
      if(!isSuperAdmin(me?.role)){ toast('Зөвхөн системийн админ устгана'); return; }
      if(!tripId){ toast('Баг олдсонгүй'); return; }
      const label=driverName||'баг';
      if(!confirm(`"${label}"багийг бүрмөсөн устгах уу?\n\nАялал, хамт явагчдын бүртгэл устгагдана.`)) return;
      try{
        const { error }=await sb.rpc('admin_delete_trip_team',{ target_trip_id: tripId });
        if(error){
          if(/Could not find the function/i.test(error.message)){
            await sb.from('field_site_sessions').delete().eq('trip_id',tripId);
            try{ await sb.from('trip_passengers').delete().eq('trip_id',tripId); }catch(e){}
            const { error:de }=await sb.from('trips').delete().eq('id',tripId);
            if(de) throw de;
          }else throw error;
        }
        closeModal();
        toast('Баг устгагдлаа');
        loadAll();
      }catch(e){
        toast(e.message||'Устгахад алдаа');
      }
    }
    window.deleteCompanionTeam=deleteCompanionTeam;
    window.openCompanionModal=(i)=>{
      const t=(window._companionList||[])[i]; if(!t) return;
      const esc=v=>String(v??'').replace(/</g,'&lt;');
      const pass=(t.passengers||[]).length
        ? (t.passengers||[]).map(p=>`<li><b>${esc(p.passenger_name)}</b> <span class=muted>${new Date(p.scanned_at).toLocaleString('mn-MN')}</span></li>`).join('')
        : '<li class=muted>Хамт яваа хүн бүртгэгдээгүй</li>';
      const delBtn=isSuperAdmin(me?.role)
        ? `<button type="button" class="btn btn-danger btn-sm" style="margin-top:16px" onclick="deleteCompanionTeam('${t.id}','${String(t.driver_name||'').replace(/'/g,"\\'")}')"> Баг устгах</button>`
        : '';
      openModal('Хамт яваа баг',`
        <p><b>Жолооч:</b> ${esc(t.driver_name||'—')}</p>
        <p><b>Машин:</b> ${esc(t.plate_number||'—')}</p>
        <p><b>Явсан зам:</b> ${tripKm(t).toFixed(2)} км</p>
        <p><b>Хугацаа:</b> ${formatDuration(tripDuration(t))}${t.status==='active'&&!t.ended_at?'<span class=muted>(явж байна)</span>':''}</p>
        <p><b>Төлөв:</b> ${t.status==='active' ?'Явж байна':'Дууссан'}</p>
        <p><b>Эхэлсэн:</b> ${new Date(t.started_at).toLocaleString('mn-MN')}</p>
        ${t.ended_at?`<p><b>Дууссан:</b> ${new Date(t.ended_at).toLocaleString('mn-MN')}</p>`:''}
        ${Number(t.liters)>0?`<p><b>Түлш:</b> ${Number(t.liters).toFixed(2)} л${Number(t.cost)>0?` · ${money(t.cost)}`:''}</p>`:''}
        <label style="margin-top:14px">Хамт яваа хүмүүс</label>
        <ul style="margin:8px 0 0;padding-left:20px;line-height:1.8">${pass}</ul>
        ${delBtn}
      `,'Хаах',()=>false);
    };

    // ===== Барааны хэрэглээ / үлдэгдэл =====
    function renderUsage(c){
      const tab=(k,label)=>`<button class="btn btn-sm ${usageTab===k?'btn-primary':'btn-ghost'}" onclick="setUsageTab('${k}')">${label}</button>`;
      const byUser=computeBalancesByUser(data.movements);
      const totalItems=byUser.reduce((s,u)=>s+u.items.length,0);
      const totalQty=byUser.reduce((s,u)=>s+u.items.reduce((a,it)=>a+Number(it.quantity||0),0),0);
      if(usageTab==='log'){
        const rows=(data.movements||[]).map(m=>{
          const type=m.movement_type||'withdraw';
          const isOut=type==='consume' ||type==='return';
          const pill=isOut?`<span class="pill out">−${m.quantity} ${m.unit||''}</span>`:`<span class="pill in">+${m.quantity} ${m.unit||''}</span>`;
          return `<tr><td><span class="pill ${isOut?'out':'in'}">${movementTypeLabel(type)}</span></td><td><b>${m.item_name||'—'}</b></td><td>${m.user_name||'—'}</td><td>${pill}</td><td class=muted>${new Date(m.created_at).toLocaleString('mn-MN')}</td></tr>`;
        }).join('');
        c.innerHTML=`<div class="card"><div class="card-h"><h3>Барааны гүйлгээ</h3>
          <div style="display:flex;gap:8px;flex-wrap:wrap">${tab('balances','Үлдэгдэл ('+totalItems+')')}${tab('log','Гүйлгээ ('+(data.movements||[]).length+')')}
          <button class="btn btn-primary btn-sm" onclick="exportUsage()">Excel</button></div></div>
          <div class="card-b" style="padding:0"><table><thead><tr><th>Төрөл</th><th>Бараа</th><th>Ажилтан</th><th>Тоо</th><th>Огноо</th></tr></thead>
          <tbody>${rows||'<tr><td colspan=5 class=empty>Гүйлгээ алга</td></tr>'}</tbody></table></div></div>`;
        return;
      }
      const rows=byUser.flatMap(u=>u.items.map(it=>`<tr>
        <td><b>${u.user_name}</b></td>
        <td>${it.item_name}</td>
        <td><span class="pill ${it.category==='tool' ?'admin':'emp'}">${it.category==='tool' ?'Багаж':'Бараа'}</span></td>
        <td><b style="color:var(--primary)">${Number(it.quantity).toFixed(it.quantity%1?1:0)}</b> ${it.unit}</td>
        <td><button class="btn btn-ghost btn-sm" onclick='openEmpStockModal(${JSON.stringify({id:u.user_id,name:u.user_name}).replace(/'/g,"&#39;")})'>Дэлгэрэнгүй</button></td>
      </tr>`)).join('');
      c.innerHTML=`<div class="card"><div class="card-h"><h3>Ажилтны үлдэгдэл</h3>
        <div style="display:flex;gap:8px;flex-wrap:wrap">${tab('balances','Үлдэгдэл ('+totalItems+')')}${tab('log','Гүйлгээ ('+(data.movements||[]).length+')')}
        <button class="btn btn-primary btn-sm" onclick="exportUsage()">Excel</button></div></div>
        <div class="card-b" style="padding:12px 16px"><p style="margin:0"><b>Нийт:</b> ${totalItems} төрөл · ${totalQty.toFixed(totalQty%1?1:0)} нэгж · ${byUser.length} ажилтан</p>
        <p class="muted" style="margin:6px 0 0;font-size:13px">Агуулахаас авсан − ажил дээр хэрэглэсэн = үлдэгдэл</p></div>
        <div class="card-b" style="padding:0"><table><thead><tr><th>Ажилтан</th><th>Бараа</th><th>Ангилал</th><th>Үлдэгдэл</th><th></th></tr></thead>
        <tbody>${rows||'<tr><td colspan=5 class=empty>Үлдэгдэл алга</td></tr>'}</tbody></table></div></div>`;
    }

    // ===== Агуулах =====
    let invCat='material';
    window.setInvCat=(k)=>{ invCat=k; render(); };
    function catName(k){ return k==='tool' ?'Багаж':'Бараа материал'; }
    function barFieldHtml(value='', inputId='i_bar_mat'){
      const esc=v=>String(v??'').replace(/"/g,'&quot;');
      return `<div class="bar-row"><div><label>Баркод</label><input id="${inputId}" value="${esc(value)}" placeholder="Скан эсвэл гараар"></div>
        <button type="button" class="btn btn-success btn-sm" onclick="openBarScan('${inputId}')"> Скан</button></div>`;
    }
    function renderInventory(c){
      const list=data.inventory.filter(it=>(it.category||'material')===invCat);
      window._invList=list;
      const tab=(k,label)=>`<button class="btn btn-sm ${invCat===k?'btn-primary':'btn-ghost'}" onclick="setInvCat('${k}')">${label}</button>`;
      const priceHead = invCat === 'tool' ? '<th>Үнэ</th>': '';
      const priceCell = (it) => (invCat === 'tool' ? `<td>${money(it.price)}</td>` : '');
      const colSpan = invCat === 'tool' ? 7 : 6;
      c.innerHTML=`<div class="card"><div class="card-h"><h3>Агуулах (${list.length})</h3>
        <div style="display:flex;gap:8px">${tab('material','Бараа материал')}${tab('tool','Багаж')}<button class="btn btn-primary btn-sm" onclick="invModal()"> Бараа нэмэх</button></div></div>
        <div class="card-b" style="padding:0"><table><thead><tr><th></th><th>Нэр</th><th>Нэгж</th><th>Тоо</th>${priceHead}<th>Баркод</th><th></th></tr></thead>
        <tbody>${list.map((it,i)=>`<tr><td>${invThumb(it)}</td><td><b>${it.name}</b></td><td>${it.unit||''}</td>
          <td><button class="btn btn-ghost btn-sm" onclick="adjQty('${it.id}',${it.quantity},-1)">−</button> <b>${it.quantity}</b> <button class="btn btn-ghost btn-sm" onclick="adjQty('${it.id}',${it.quantity},1)"></button></td>
          ${priceCell(it)}<td class=muted>${it.barcode||'—'}</td>
          <td style="white-space:nowrap"><button class="btn btn-ghost btn-sm" onclick="editInvModal(${i})">Засах</button> <button class="btn btn-danger btn-sm" onclick="delInv('${it.id}','${String(it.name).replace(/'/g,"\\'")}')">Устгах</button></td></tr>`).join('')||`<tr><td colspan=${colSpan} class=empty>${catName(invCat)} алга</td></tr>`}</tbody></table></div></div>`;
    }
    window.adjQty = async (id,q,d)=>{ const nq=Math.max(0,q+d); await sb.from('inventory').update({quantity:nq}).eq('id',id); loadAll(); };
    window.delInv = async (id,name)=>{ if(!confirm(name+'устгах уу?'))return; await sb.from('inventory').delete().eq('id',id); toast('Устгагдлаа'); loadAll(); };
    window.invModal = ()=>{
      openModal('Шинэ бараа нэмэх',`
        <label>Ангилал</label>
        <select id="i_cat" onchange="toggleInvPrice()"><option value="material"${invCat==='material' ?'selected':''}>Бараа материал</option><option value="tool"${invCat==='tool' ?'selected':''}>Багаж</option></select>
        <label>Нэр</label><input id="i_name" placeholder="Router (чиглүүлэгч)">
        <div class="row"><div><label>Нэгж</label><input id="i_unit" value="ширхэг"></div><div><label>Тоо</label><input id="i_qty" value="0"></div></div>
        <div class="row" id="i_price_row" style="display:${invCat==='tool' ?'flex':'none'}"><div><label>Үнэ (₮)</label><input id="i_price" value="0"></div></div>
        <div id="i_bar_wrap">${barFieldHtml('', invCat==='tool' ?'i_bar':'i_bar_mat')}</div>
        <div class="err" id="m_err"></div>`,
        'Хадгалах', async ()=>{
          const name=$('i_name').value.trim(); if(!name){ mErr('Нэр оруулна уу'); return false; }
          const cat=$('i_cat').value;
          const barcode=cat==='tool' ?$('i_bar').value.trim():$('i_bar_mat').value.trim();
          const { error } = await sb.from('inventory').insert({name,unit:$('i_unit').value.trim()||'ширхэг',quantity:Number($('i_qty').value)||0,price:cat==='tool' ?Number($('i_price').value)||0:0,barcode:barcode||null,category:cat});
          if(error){ mErr(error.message); return false; }
          closeModal(); toast('Бараа нэмэгдлээ'); loadAll(); return false;
        });
      setTimeout(()=>openBarScan(invCat==='tool' ?'i_bar':'i_bar_mat'), 350);
    };
    window.toggleInvPrice=()=>{
      const cat=$('i_cat')?.value||'material';
      const row=$('i_price_row'); const wrap=$('i_bar_wrap');
      const oldBar=$('i_bar')?.value||$('i_bar_mat')?.value||'';
      if(row) row.style.display=cat==='tool' ?'flex':'none';
      if(wrap) wrap.innerHTML=barFieldHtml(oldBar, cat==='tool' ?'i_bar':'i_bar_mat');
    };
    window.editInvModal=(i)=>{
      const it=(window._invList||[])[i]; if(!it) return;
      const esc=v=>String(v??'').replace(/"/g,'&quot;');
      const cat=it.category||'material';
      openModal('Бараа засах',`
        <label>Ангилал</label>
        <select id="i_cat" onchange="toggleInvPrice()"><option value="material"${cat==='material' ?'selected':''}>Бараа материал</option><option value="tool"${cat==='tool' ?'selected':''}>Багаж</option></select>
        <label>Нэр</label><input id="i_name" value="${esc(it.name)}">
        <div class="row"><div><label>Нэгж</label><input id="i_unit" value="${esc(it.unit||'ширхэг')}"></div><div><label>Тоо</label><input id="i_qty" value="${it.quantity??0}"></div></div>
        <div class="row" id="i_price_row" style="display:${cat==='tool' ?'flex':'none'}"><div><label>Үнэ (₮)</label><input id="i_price" value="${it.price??0}"></div></div>
        <div id="i_bar_wrap">${barFieldHtml(it.barcode||'', cat==='tool' ?'i_bar':'i_bar_mat')}</div>
        <div class="err" id="m_err"></div>`,
        'Хадгалах', async ()=>{
          const name=$('i_name').value.trim(); if(!name){ mErr('Нэр оруулна уу'); return false; }
          const newCat=$('i_cat').value;
          const barcode=newCat==='tool' ?$('i_bar').value.trim():$('i_bar_mat').value.trim();
          const { error } = await sb.from('inventory').update({
            name,
            unit:$('i_unit').value.trim()||'ширхэг',
            quantity:Number($('i_qty').value)||0,
            price:newCat==='tool' ?Number($('i_price').value)||0:0,
            barcode:barcode||null,
            category:newCat,
          }).eq('id',it.id);
          if(error){ mErr(error.message); return false; }
          closeModal(); toast('Шинэчлэгдлээ'); loadAll(); return false;
        });
    };

    // ===== Бар код уншуулах =====
    let qrScanner=null, qrScanInputId=null;
    window.openBarScan=async(inputId)=>{
      qrScanInputId=inputId;
      const layer=$('scanOverlay');
      layer.innerHTML=`<div class="modal" style="max-width:520px"><div class="modal-h">Бар код уншуулах<button class="x" onclick="stopBarScan()"></button></div>
        <div class="modal-b"><div id="qr-reader"></div><p class="muted" style="margin-top:12px;font-size:13px">Зураасан кодыг камерын дээр байрлуулна уу</p></div></div>`;
      layer.style.display='flex';
      try{
        qrScanner=new Html5Qrcode('qr-reader');
        await qrScanner.start({facingMode:'environment'},{fps:10,qrbox:{width:280,height:160}},
          (code)=>{ const el=$(qrScanInputId); if(el) el.value=code; toast('Код уншигдлаа'); stopBarScan(); },
          ()=>{});
      }catch(e){ toast('Камер ашиглах боломжгүй: '+(e.message||'')); stopBarScan(); }
    };
    window.stopBarScan=async()=>{
      try{ if(qrScanner){ await qrScanner.stop(); qrScanner.clear(); } }catch(e){}
      qrScanner=null; qrScanInputId=null;
      const layer=$('scanOverlay');
      layer.style.display='none'; layer.innerHTML='';
    };

    // ===== Modal helper =====
    let modalConfirm=null;
    function openModal(title,body,okText,onOk){
      modalConfirm=onOk;
      $('overlay').innerHTML=`<div class="modal"><div class="modal-h">${title}<button class="x" onclick="closeModal()"></button></div>
        <div class="modal-b">${body}</div><div class="modal-f">
        <button class="btn btn-ghost" onclick="closeModal()">Болих</button>
        <button class="btn btn-primary" id="okBtn">${okText}</button></div></div>`;
      $('overlay').style.display='flex';
      $('okBtn').onclick=async()=>{ if(modalConfirm){ const r=await modalConfirm(); if(r===true) closeModal(); } };
    }
    function closeModal(){ $('overlay').style.display='none'; $('overlay').innerHTML=''; modalConfirm=null; }
    window.closeModal=closeModal;
  </script>
</body>
</html>
