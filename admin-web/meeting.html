<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Gennetex — Live</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;background:#0b0f1a;color:#fff;font-family:system-ui,-apple-system,sans-serif}
    #app{display:flex;flex-direction:column;height:100%}
    .stage{flex:1;display:flex;align-items:center;justify-content:center;position:relative;background:#000;min-height:240px}
    video{width:100%;height:100%;object-fit:cover;background:#000}
    .status{position:absolute;left:12px;right:12px;bottom:16px;text-align:center;color:#94a3b8;font-size:14px;text-shadow:0 1px 3px #000}
    .bar{display:flex;align-items:center;gap:10px;padding:14px 16px 18px;background:#111827;flex-wrap:wrap}
    .live{background:#ef4444;color:#fff;font-weight:900;font-size:11px;padding:3px 8px;border-radius:6px}
    .title{flex:1;font-weight:700;font-size:15px;min-width:140px}
    .btn{border:0;border-radius:8px;padding:10px 14px;font-weight:700;cursor:pointer;font-size:14px}
    .btn-primary{background:#4f6ef7;color:#fff}
    .btn-secondary{background:#374151;color:#fff}
    .btn-danger{background:#333;color:#fff}
    .peers{padding:8px 16px;font-size:13px;color:#94a3b8;background:#0f172a}
    .err{color:#fca5a5;padding:24px;text-align:center}
  </style>
</head>
<body>
  <div id="app">
    <div class="stage">
      <video id="video" autoplay playsinline></video>
      <div class="status" id="status">Ачаалж байна...</div>
    </div>
    <div class="peers" id="peers"></div>
    <div class="bar">
      <span class="live">LIVE</span>
      <div class="title" id="title">Gennetex Live</div>
      <button class="btn btn-primary" id="camBtn" style="display:none">Камер</button>
      <button class="btn btn-secondary" id="shareBtn" style="display:none">Дэлгэц share</button>
      <button class="btn btn-danger" id="leaveBtn">Гарах</button>
    </div>
  </div>
  <script>
    const SUPABASE_URL = 'https://xhxyrzzgmksjlibfrmlx.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhoeHlyenpnbWtzamxpYmZybWx4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4ODEwMjYsImV4cCI6MjA5ODQ1NzAyNn0.nYWs_N09RLHvhmEUCdbS6M8yvthsKJ5TkXjdRv4VMag';
    const params = new URLSearchParams(location.search);
    const MEETING_ID = String(params.get('id') || '').replace(/[^a-zA-Z0-9-]/g, '');
    const IS_HOST = params.get('role') === 'host';
    const DISPLAY_NAME = String(params.get('name') || (IS_HOST ? 'Админ' : 'Ажилтан')).slice(0, 40);
    const MY_ID = IS_HOST ? 'host' : ('p_' + Math.random().toString(36).slice(2) + Date.now().toString(36));

    if (!MEETING_ID) {
      document.getElementById('status').textContent = 'Live ID олдсонгүй';
      document.getElementById('status').className = 'err';
      throw new Error('no meeting id');
    }

    document.getElementById('title').textContent = IS_HOST ? 'Та live хийж байна' : 'Live үзэж байна';
    document.getElementById('leaveBtn').textContent = IS_HOST ? 'Дуусгах' : 'Гарах';
    if (IS_HOST) {
      document.getElementById('shareBtn').style.display = '';
      document.getElementById('camBtn').style.display = '';
      document.getElementById('video').muted = true;
    }

    const video = document.getElementById('video');
    const statusEl = document.getElementById('status');
    const peersEl = document.getElementById('peers');
    const setStatus = (t) => { statusEl.textContent = t || ''; };

    const ICE = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] };
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const channel = sb.channel('meeting-' + MEETING_ID, { config: { broadcast: { self: false } } });
    const peers = new Map();
    let localStream = null;
    let ended = false;

    function send(payload) {
      channel.send({ type: 'broadcast', event: 'signal', payload });
    }

    function updatePeerCount() {
      if (!IS_HOST) return;
      peersEl.textContent = 'Оролцогч: ' + peers.size;
    }

    function createPc(peerId) {
      const pc = new RTCPeerConnection(ICE);
      pc.onicecandidate = (e) => {
        if (e.candidate) send({ type: 'ice', from: MY_ID, to: peerId, candidate: e.candidate });
      };
      pc.onconnectionstatechange = () => {
        if (['failed', 'disconnected', 'closed'].includes(pc.connectionState)) {
          peers.delete(peerId);
          updatePeerCount();
        }
      };
      if (!IS_HOST) {
        pc.ontrack = (e) => {
          video.srcObject = e.streams[0];
          setStatus('');
        };
      }
      peers.set(peerId, pc);
      updatePeerCount();
      return pc;
    }

    async function hostAddPeer(peerId) {
      if (!localStream) {
        setStatus('Камер/share бэлэн биш');
        return;
      }
      let pc = peers.get(peerId);
      if (pc) { try { pc.close(); } catch (e) {} peers.delete(peerId); }
      pc = createPc(peerId);
      localStream.getTracks().forEach((t) => pc.addTrack(t, localStream));
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      send({ type: 'offer', from: 'host', to: peerId, sdp: offer });
    }

    async function republishAll() {
      send({ type: 'host-ready', from: 'host' });
      for (const peerId of [...peers.keys()]) {
        try { await hostAddPeer(peerId); } catch (e) {}
      }
    }

    async function handleSignal(msg) {
      if (!msg || ended) return;
      if (msg.to && msg.to !== MY_ID && msg.to !== '*') return;

      if (msg.type === 'join' && IS_HOST) {
        await hostAddPeer(msg.from);
        return;
      }
      if (msg.type === 'host-ready' && !IS_HOST) {
        send({ type: 'join', from: MY_ID, name: DISPLAY_NAME });
        return;
      }
      if (msg.type === 'offer' && !IS_HOST && msg.to === MY_ID) {
        let pc = peers.get('host');
        if (pc) { try { pc.close(); } catch (e) {} }
        pc = createPc('host');
        await pc.setRemoteDescription(msg.sdp);
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        send({ type: 'answer', from: MY_ID, to: 'host', sdp: answer });
        setStatus('Холбогдлоо');
        return;
      }
      if (msg.type === 'answer' && IS_HOST && msg.to === 'host') {
        const pc = peers.get(msg.from);
        if (pc) await pc.setRemoteDescription(msg.sdp);
        return;
      }
      if (msg.type === 'ice') {
        const key = IS_HOST ? msg.from : 'host';
        const pc = peers.get(key);
        if (pc && msg.candidate) {
          try { await pc.addIceCandidate(msg.candidate); } catch (e) {}
        }
        return;
      }
      if (msg.type === 'leave' && IS_HOST) {
        const pc = peers.get(msg.from);
        if (pc) { try { pc.close(); } catch (e) {} peers.delete(msg.from); updatePeerCount(); }
        return;
      }
      if (msg.type === 'ended' && !IS_HOST) {
        setStatus('Live дууслаа');
        ended = true;
        setTimeout(() => { location.href = 'index.html'; }, 1000);
      }
    }

    function stopLocal() {
      if (localStream) {
        localStream.getTracks().forEach((t) => t.stop());
        localStream = null;
      }
    }

    async function startCamera() {
      try {
        stopLocal();
        localStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: true,
        });
        video.srcObject = localStream;
        video.muted = true;
        try { await video.play(); } catch (e) {}
        setStatus('Live — камер асаалттай');
        await republishAll();
      } catch (e) {
        setStatus('Камер нээгдсэнгүй: ' + (e.message || e));
      }
    }

    async function startShare() {
      try {
        stopLocal();
        localStream = await navigator.mediaDevices.getDisplayMedia({ video: { frameRate: 15 }, audio: true });
        video.srcObject = localStream;
        video.muted = true;
        try { await video.play(); } catch (e) {}
        setStatus('Дэлгэц share хийгдэж байна');
        localStream.getVideoTracks()[0].onended = () => startCamera();
        await republishAll();
      } catch (e) {
        setStatus('Дэлгэц share амжилтгүй: ' + (e.message || e));
        startCamera();
      }
    }

    async function endMeeting() {
      ended = true;
      send({ type: 'ended', from: 'host' });
      peers.forEach((pc) => { try { pc.close(); } catch (e) {} });
      peers.clear();
      stopLocal();
      await sb.from('meetings').update({ status: 'ended', ended_at: new Date().toISOString() }).eq('id', MEETING_ID).eq('status', 'active');
      location.href = 'index.html';
    }

    function leave() {
      if (IS_HOST) return endMeeting();
      send({ type: 'leave', from: MY_ID });
      peers.forEach((pc) => { try { pc.close(); } catch (e) {} });
      location.href = 'index.html';
    }

    document.getElementById('leaveBtn').onclick = leave;
    document.getElementById('shareBtn').onclick = startShare;
    document.getElementById('camBtn').onclick = startCamera;

    channel
      .on('broadcast', { event: 'signal' }, ({ payload }) => handleSignal(payload))
      .subscribe((status) => {
        if (status !== 'SUBSCRIBED') return;
        if (IS_HOST) {
          setStatus('Камер нээж байна...');
          startCamera();
        } else {
          setStatus('Live-д холбогдож байна...');
          send({ type: 'join', from: MY_ID, name: DISPLAY_NAME });
          setTimeout(() => { if (!ended) send({ type: 'join', from: MY_ID, name: DISPLAY_NAME }); }, 2000);
        }
      });
  </script>
</body>
</html>
